<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRAXEX CYBER MINER</title>
</head>

<body style="margin:0; font-family:Arial; background:#0f0f1a; color:white; text-align:center;">

<h1 style="color:#00ffd5; margin-top:20px;">⚡ TRAXEX CYBER MINER</h1>

<p>🔥 Site is working!</p>

<div style="margin-top:20px;">
  💰 Balance: <span id="balance">0</span> TRAXEX
</div>

<div style="margin-top:20px;">
  🏆 Level: <span id="level">1</span>
</div>

<div style="margin-top:20px;">
  ⭐ XP: <span id="xp">0</span>
</div>

<button onclick="mine()" style="margin-top:20px; padding:10px 20px;">
MINE ⛏
</button>

<button onclick="boost()" style="margin-top:10px; padding:10px 20px;">
BOOST ⚡
</button>

<button onclick="openShop()" style="margin-top:10px; padding:10px 20px;">
SHOP 🛒
</button>

<script>
let balance = localStorage.getItem("balance");
let xp = localStorage.getItem("xp");
let level = localStorage.getItem("level");

if (balance === null) balance = 0;
if (xp === null) xp = 0;
if (level === null) level = 1;

balance = parseInt(balance);
xp = parseInt(xp);
level = parseInt(level);

function updateUI() {
    document.getElementById("balance").innerText = balance;
    document.getElementById("xp").innerText = xp;
    document.getElementById("level").innerText = level;
}

function mine() {
    let reward = Math.floor(Math.random() * 5) + 1;
    balance += reward;
    xp += 1;

    if (xp >= level * 10) {
        level += 1;
        xp = 0;
        alert("LEVEL UP! 🎉 Level: " + level);
    }

    localStorage.setItem("balance", balance);
    localStorage.setItem("xp", xp);
    localStorage.setItem("level", level);

    updateUI();
}

function boost() {
    alert("Boost Activated!");
}

function openShop() {
    alert("Shop Coming Soon");
}

updateUI();
</script>

</body>
</html>
