<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRAXEX PRO</title>
    <style>
        body { margin: 0; background: radial-gradient(circle, #1a1a2e, #06060c); color: white; font-family: 'Arial', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .balance-container { text-align: center; margin-bottom: 30px; }
        #balance { font-size: 3rem; font-weight: bold; color: #00ffd5; text-shadow: 0 0 10px #00ffd5; }
        .coin { width: 200px; height: 200px; background: linear-gradient(135deg, #00ffd5, #008f7a); border-radius: 50%; box-shadow: 0 0 30px rgba(0, 255, 213, 0.4); cursor: pointer; transition: transform 0.1s; display: flex; align-items: center; justify-content: center; }
        .coin:active { transform: scale(0.95); }
        .footer-nav { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; padding: 15px; background: #161625; }
        .nav-item { color: #888; font-size: 14px; }
    </style>
</head>
<body>
    <div class="balance-container">
        <div>موجودی TRAX</div>
        <div id="balance">0</div>
    </div>
    
    <div class="coin" onclick="mine()">TAP</div>

    <div class="footer-nav">
        <div class="nav-item">🏠 خانه</div>
        <div class="nav-item">👥 رفرال</div>
        <div class="nav-item">🏆 لیدربورد</div>
    </div>

    <script>
        function mine() {
            let balanceEl = document.getElementById('balance');
            let current = parseInt(balanceEl.innerText);
            balanceEl.innerText = current + 1;
            // اینجا بعداً کد ذخیره در دیتابیس را اضافه می‌کنیم
        }
    </script>
</body>
</html>
