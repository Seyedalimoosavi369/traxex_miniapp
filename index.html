<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRAXEX PRO</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="app">
        <main id="home" class="page active">
            <div class="header">Total Balance: <span id="balance">12,850.75</span> TRX</div>
            <div class="mining-circle" onclick="mine()">
                <div class="inner-circle"><h1>25.65</h1><p>TRX</p></div>
            </div>
        </main>

        <section id="network" class="page">
            <h2>Network</h2>
            <div id="tree-container">درخت باینری اینجا نمایش داده می‌شود</div>
        </section>

        <section id="shop" class="page">
            <h2>Shop</h2>
            <div id="shop-items"></div>
        </section>

        <section id="wallet" class="page">
            <h2>Wallet</h2>
            <div id="wallet-balance">12,850.75 TRX</div>
        </section>

        <section id="profile" class="page">
            <h2>Profile</h2>
            <div id="user-info">@username - ID: 123456789</div>
        </section>
    </div>

    <nav class="nav-menu">
        <button onclick="showPage('home')">🏠<span>Home</span></button>
        <button onclick="showPage('network')">👥<span>Network</span></button>
        <button onclick="showPage('shop')">🛒<span>Shop</span></button>
        <button onclick="showPage('wallet')">💳<span>Wallet</span></button>
        <button onclick="showPage('profile')">👤<span>Profile</span></button>
    </nav>

    <script src="main.js"></script>
</body>
</html>
