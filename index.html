        </div>
        <div id="referral" class="page">

    </div>
    <div class="nav-menu">
        <button onclick="showPage('home')">🏠</button>
        <button onclick="showPage('shop')">🛒</button>
        <button onclick="showPage('referral')">👥</button>

    <script src="game.js"></script>

</html>
