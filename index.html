<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>TRAXEX PRO</title>
    <link rel="stylesheet" href="style.css"> 
</head>
<body>
    <div style="background:#111; padding:10px; display:flex; justify-content:space-between; color:#ffd700; font-weight:bold; border-bottom: 2px solid #333;">
        <span>TRX: <span id="balance">0</span></span>
        <span>TON: <span id="ton-balance">0</span></span>
    </div>

    <div id="app">
        <div id="home" class="page active-page">
            <div class="btn-mine" onclick="mine()"></div>
        </div>
        <div id="shop" class="page">
            <div id="shop-items"></div>
        </div>
    </div>

    <div class="nav-menu">
        <button onclick="showPage('home')">خانه</button>
        <button onclick="showPage('shop')">فروشگاه</button>
    </div>

    <script src="game.js"></script>
    <script src="ui.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            renderShop();
            document.getElementById('balance').innerText = balanceTRX.toLocaleString();
            document.getElementById('ton-balance').innerText = balanceTON;
        });
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            document.getElementById(pageId).style.display = 'block';
        }
    </script>
</body>
</html>
