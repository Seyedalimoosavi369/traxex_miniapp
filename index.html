<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRAXEX CYBER MINER</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: radial-gradient(circle at top, #0f0f1a, #000);
    color: white;
    overflow-x: hidden;
}

/* HEADER */
.header {
    text-align: center;
    padding: 15px;
    font-size: 22px;
    font-weight: bold;
    color: #00ffd5;
    letter-spacing: 2px;
}

/* PROFILE */
.profile-box {
    width: 90%;
    margin: 10px auto;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(0,255,213,0.2);
    border-radius: 15px;
    padding: 12px;
    text-align: center;
}

/* MAIN COIN AREA */
.coin-area {
    width: 250px;
    height: 250px;
    margin: 20px auto;
    border-radius: 50%;
    background: radial-gradient(circle, #00ffd5, #0066ff);
    box-shadow: 0 0 40px #00ffd5;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    font-weight: bold;
    color: black;
    cursor: pointer;
    transition: 0.2s;
}

.coin-area:active {
    transform: scale(0.95);
}

/* STATS */
.stats {
    display: flex;
    justify-content: space-around;
    margin-top: 10px;
}

.stat {
    background: rgba(255,255,255,0.05);
    padding: 10px;
    border-radius: 10px;
    width: 40%;
    text-align: center;
    border: 1px solid rgba(0,255,213,0.1);
}

/* BUTTONS */
button {
    width: 90%;
    margin: 10px auto;
    display: block;
    padding: 12px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(90deg, #00ffd5, #0066ff);
    color: black;
    font-weight: bold;
    font-size: 14px;
    cursor: pointer;
}

/* LEADERBOARD */
.leaderboard {
    width: 90%;
    margin: 15px auto;
    background: rgba(255,255,255,0.05);
    border-radius: 15px;
    padding: 10px;
    border: 1px solid rgba(0,255,213,0.2);
}

.rank-item {
    padding: 5px;
    font-size: 13px;
    color: #aaa;
}

/* BOTTOM BAR */
.bottom {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: rgba(0,0,0,0.8);
    display: flex;
    justify-content: space-around;
    padding: 10px 0;
    border-top: 1px solid rgba(0,255,213,0.2);
}

.bottom div {
    font-size: 12px;
    color: #00ffd5;
}
</style>
</head>

<body>

<div class="header">⚡ TRAXEX CYBER MINER</div>

<div class="profile-box">
👤 Player: Loading... <br>
💰 Balance: <span id="balance">0</span> TRAXEX
</div>

<div class="coin-area" onclick="mine()">
MINE
</div>

<div class="stats">
<div class="stat">
⛏ Power<br>4x
</div>
<div class="stat">
⚡ Speed<br>Fast
</div>
</div>

<button onclick="boost()">⚡ BOOST MINE</button>
<button onclick="openShop()">🛒 SHOP</button>

<div class="leaderboard">
🏆 TOP 20
<div class="rank-item">1. Player A - 1,200,000</div>
<div class="rank-item">2. Player B - 900,000</div>
<div class="rank-item">3. Player C - 800,000</div>
<div class="rank-item">...</div>
</div>

<div class="bottom">
<div>🏠 Home</div>
<div>⛏ Mine</div>
<div>👥 Team</div>
<div>💎 Wallet</div>
</div>

<script>
let balance = 0;

function mine() {
    let reward = Math.floor(Math.random() * 5) + 1;
    balance += reward;
    document.getElementById("balance").innerText = balance;
}

function boost() {
    alert("Boost Activated!");
}

function openShop() {
    alert("Shop Coming Soon");
}
</script>

</body>
</html>
