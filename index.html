<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>TRAXEX PRO</title>
    <link rel="stylesheet" href="style.css"> 
</head>
<body>
    <div id="app">
        <div id="home" class="page active-page">
            <div id="balance" style="text-align: center; font-size: 40px; margin: 20px;">0</div>
            <div class="btn-mine" onclick="mine()"></div>
        </div>
        <div id="shop" class="page">
            <h2>Upgrade Items</h2>
            <div id="shop-items"></div>
        </div>
    </div>

    <div class="nav-menu">
        <button onclick="showPage('home')">خانه</button>
        <button onclick="showPage('shop')">فروشگاه</button>
    </div>

    <script src="game.js"></script>
    <script src="ui.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", renderShop);
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            document.getElementById(pageId).style.display = 'block';
        }
    </script>
</body>
</html>
