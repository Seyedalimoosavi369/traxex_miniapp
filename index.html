<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>TRAXEX PRO</title>
    <style>
        body { margin: 0; background: #05070a; color: white; font-family: sans-serif; }
        .page { display: none; padding: 20px; text-align: center; }
        .active-page { display: block; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #0f1219; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #1e2538; z-index: 1000; }
        .nav-item { font-size: 10px; cursor: pointer; color: #718096; }
        .card { background: #11141d; padding: 10px; border-radius: 10px; margin: 5px; border: 1px solid #1e2538; }
        .btn-mine { width: 200px; height: 200px; border-radius: 50%; border: 4px solid #00f2ff; background: url('traxex.jpg') center/cover; margin: 20px auto; cursor: pointer; }
    </style>
</head>
<body>

    <div id="home" class="page active-page">
        <div id="balance" style="font-size: 30px; font-weight: bold;">0</div>
        <div class="btn-mine" onclick="mine()"></div>
    </div>

    <div id="shop" class="page">
        <h2>فروشگاه آیتم‌ها</h2>
        <div id="shop-items"></div>
    </div>

    <div class="nav-bar">
        <div class="nav-item" onclick="showPage('home')">🏠<br>Home</div>
        <div class="nav-item" onclick="showPage('shop')">🛒<br>Shop</div>
    </div>

    <script>
        // لیست ۳۰ آیتم
        const items = Array.from({length: 30}, (_, i) => ({
            id: i + 1,
            name: "Item " + (i + 1),
            basePrice: 10000000,
            level: 1
        }));

        // تابع نمایش آیتم‌ها
        function renderShop() {
            const container = document.getElementById('shop-items');
            items.forEach(item => {
                let cost = item.basePrice * Math.pow(2, item.level - 1);
                container.innerHTML += `
                    <div class="card">
                        <h3>${item.name}</h3>
                        <p>لول: ${item.level}</p>
                        <button onclick="buy(${item.id})">ارتقا با ${cost.toLocaleString()} TRX</button>
                    </div>`;
            });
        }

        function buy(id) {
            let item = items.find(i => i.id === id);
            item.level++;
            alert("ارتقا یافت!");
            document.getElementById('shop-items').innerHTML = "";
            renderShop();
        }

        function mine() {
            let b = document.getElementById('balance');
            b.innerText = parseInt(b.innerText) + 10;
        }

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(id).classList.add('active-page');
        }

        renderShop();
    </script>
</body>
</html>
