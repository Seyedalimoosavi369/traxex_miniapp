<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRAXEX CYBER MINER</title>
</head>

<body style="margin:0; font-family:Arial; background:#0f0f1a; color:white; text-align:center;">

<h1 style="color:#00ffd5; margin-top:20px;">⚡ TRAXEX CYBER MINER</h1>

<p>🔥 Site is working!</p>

<div style="margin-top:30px;">
  💰 Balance: 0 TRAXEX
</div>
<script>
let balance = localStorage.getItem("balance");

if (balance === null) {
    balance = 0;
} else {
    balance = parseInt(balance);
}

document.getElementById("balance").innerText = balance;

function mine() {
    let reward = Math.floor(Math.random() * 5) + 1;
    balance += reward;

    document.getElementById("balance").innerText = balance;

    localStorage.setItem("balance", balance);
}

function boost() {
    alert("Boost Activated!");
}

function openShop() {
    alert("Shop Coming Soon");
}
</script>
</body>
</html>
